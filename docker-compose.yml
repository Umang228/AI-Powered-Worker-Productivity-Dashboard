version: "3.9"

services:
  backend:
    build: ./backend
    container_name: factory-backend
    ports:
      - "8000:8000"
    volumes:
      - db-data:/app
    environment:
      - DATABASE_URL=sqlite:///./factory.db
    restart: unless-stopped

  frontend:
    build: ./frontend
    container_name: factory-frontend
    ports:
      - "3000:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  db-data:
